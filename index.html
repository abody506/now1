<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA AI — Voice Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    body { font-family: 'Rajdhani', 'Segoe UI', sans-serif; }
    .logo-text { font-family: 'Orbitron', monospace; }
    #status-pill { font-family: 'Orbitron', monospace; }
    .sidebar-title { font-family: 'Orbitron', monospace; }
  </style>
</head>

<body>
  <!-- Particle background -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <!-- App shell -->
  <div id="app" lang="en">

    <!-- ── Header ─────────────────────────────────────────── -->
    <header id="header" role="banner">
      <div class="header-logo">
        <div class="logo-icon" aria-hidden="true"></div>
        <span class="logo-text">ARIA AI</span>
      </div>

      <div class="header-controls">
        <!-- Language toggle -->
        <div class="lang-toggle" role="group" aria-label="Language selection">
          <button class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
          <button class="lang-btn"        data-lang="ar" aria-pressed="false">AR</button>
        </div>

        <!-- Status pill -->
        <div id="status-pill" role="status" aria-live="polite">
          <span class="dot" aria-hidden="true"></span>
          <span id="status-text">Ready</span>
        </div>
      </div>
    </header>

    <!-- ── Sidebar (Chat History) ─────────────────────────── -->
    <aside id="sidebar" aria-label="Chat history">
      <div class="sidebar-header">
        <span class="sidebar-title">Chat Log</span>
        <button id="clear-btn" aria-label="Clear chat history">Clear</button>
      </div>

      <div id="chat-history" role="log" aria-live="polite" aria-label="Conversation">
        <!-- Messages injected by JS -->
      </div>
    </aside>

    <!-- ── Main Visualizer ────────────────────────────────── -->
    <main id="main" aria-label="Voice assistant visualizer">

      <div class="orb-container" aria-hidden="true">
        <!-- Decorative rings -->
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>

        <!-- Central orb (also acts as mic toggle) -->
        <div
          id="orb"
          class="orb"
          role="button"
          tabindex="0"
          aria-label="انقر لإيقاف أو تشغيل الاستماع"
          aria-pressed="true"
        >
          <!-- Waveform drawn on canvas overlay -->
          <canvas id="waveform-canvas" aria-hidden="true"></canvas>

          <!-- Icon inside orb -->
          <div id="orb-icon" class="orb-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Live transcript -->
      <div
        id="transcript-display"
        role="status"
        aria-live="polite"
        aria-label="النص المسموع"
      ></div>

      <!-- مؤشر الوضع المستمر -->
      <div id="auto-listen-badge">
        <span class="badge-dot"></span>
        <span id="badge-text">استماع مستمر</span>
      </div>

    </main>

    <!-- ── Controls Bar ───────────────────────────────────── -->
    <footer id="controls" role="contentinfo">

      <!-- TTS toggle -->
      <button
        id="tts-btn"
        class="active"
        aria-label="Toggle voice output"
        aria-pressed="true"
        title="Toggle voice output"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
      </button>

      <!-- Text input -->
      <div id="text-input-wrapper">
        <input
          id="text-input"
          type="text"
          placeholder="Type your message here..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="Type a message"
          dir="ltr"
        />
        <button id="send-btn" aria-label="Send message">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>

      <!-- Mic button -->
      <button
        id="mic-btn"
        class="active"
        aria-label="إيقاف الاستماع التلقائي"
        aria-pressed="true"
        title="انقر لإيقاف/تشغيل الاستماع التلقائي"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>

    </footer>

  </div><!-- /#app -->

  <!-- Toast notification -->
  <div id="toast" role="alert" aria-live="assertive"></div>

  <script src="app.js"></script>
</body>
</html>
